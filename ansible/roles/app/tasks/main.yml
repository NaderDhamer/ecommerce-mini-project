---
- name: Require github_repo_url
  ansible.builtin.assert:
    that:
      - github_repo_url | length > 0
    fail_msg: "Set github_repo_url (e.g. -e github_repo_url=https://github.com/org/repo.git)"

- name: Write application environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ ecommerce_env_dir }}/.env"
    owner: ec2-user
    group: ec2-user
    mode: "0600"

- name: Clone or update application repository
  ansible.builtin.git:
    repo: "{{ github_repo_url }}"
    dest: "{{ app_root }}"
    version: "{{ deploy_branch }}"
    force: true
    update: true
  become_user: ec2-user
  become: true

- name: Build and start Docker Compose stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - docker-compose.aws.yml
      - up
      - -d
      - --build
    chdir: "{{ app_root }}"
  environment:
    DB_PASSWORD: "{{ db_password }}"
    CORS_ORIGINS: "http://{{ ansible_host }},http://localhost"
  become: true
  register: compose_up
  changed_when: compose_up.rc == 0

- name: Show running containers
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - docker-compose.aws.yml
      - ps
    chdir: "{{ app_root }}"
  become: true
  changed_when: false

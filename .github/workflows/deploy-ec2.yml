name: Deploy to EC2

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Configure SSH key
        run: |
          install -m 600 /dev/null /tmp/ec2_key.pem
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/ec2_key.pem

      - name: Write Ansible inventory
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          USER="${EC2_USER:-ec2-user}"
          {
            echo "all:"
            echo "  hosts:"
            echo "    ecommerce:"
            echo "      ansible_host: ${EC2_HOST}"
            echo "      ansible_user: ${USER}"
          } > ansible/inventory/ci.yml

      - name: Deploy with Ansible (git + docker compose)
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          ansible-playbook playbooks/site.yml \
            -i inventory/ci.yml \
            --private-key /tmp/ec2_key.pem \
            -e "github_repo_url=https://github.com/${{ github.repository }}.git" \
            -e "deploy_branch=${{ github.ref_name }}"

      - name: Smoke test (HTTP)
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS "http://${{ secrets.EC2_HOST }}/" -o /dev/null; then
              echo "Site is up."
              exit 0
            fi
            echo "Waiting for app... ($i/6)"
            sleep 15
          done
          echo "Site did not respond in time (build may still be running on EC2)."
          exit 1
